        // --- RENDER LOGIC ---
        const treeContainer = document.getElementById('file-tree');
        const codeView = document.getElementById('code-view');
        const welcomeScreen = document.getElementById('welcome-screen');
        const fileNameEl = document.getElementById('file-name');
        const fileDescEl = document.getElementById('file-desc');
        const codeContentEl = document.getElementById('code-content');
        const breadcrumb = document.getElementById('breadcrumb');

        function renderTree(items, container) {
            items.forEach(item => {
                const itemDiv = document.createElement('div');
                const label = document.createElement('div');
                label.className = 'tree-item';

                let iconClass = 'fa-regular fa-file';
                if (item.type === 'folder') iconClass = item.open ? 'fa-regular fa-folder-open icon-folder' : 'fa-regular fa-folder icon-folder';
                else if (item.icon) iconClass = `fa-brands fa-${item.icon} icon-${item.icon}`;

                if (item.icon === 'ts') iconClass = 'fa-solid fa-code icon-ts';
                if (item.icon === 'json') iconClass = 'fa-solid fa-file-code icon-json';
                if (item.icon === 'yml') iconClass = 'fa-solid fa-file-code icon-yml';
                if (item.icon === 'sql') iconClass = 'fa-solid fa-database icon-sql';
                if (item.icon === 'tsx') iconClass = 'fa-brands fa-react icon-tsx';
                if (item.icon === 'js') iconClass = 'fa-brands fa-js icon-js';

                label.innerHTML = `<i class="${iconClass}"></i><span>${item.name}</span>`;

                label.onclick = (e) => {
                    e.stopPropagation();
                    if (item.type === 'folder') {
                        item.open = !item.open;
                        const i = label.querySelector('i');
                        i.className = item.open ? 'fa-regular fa-folder-open icon-folder' : 'fa-regular fa-folder icon-folder';
                        const childrenDiv = itemDiv.querySelector('.tree-children');
                        if (childrenDiv) childrenDiv.classList.toggle('open');
                    } else {
                        document.querySelectorAll('.tree-item').forEach(el => el.classList.remove('active'));
                        label.classList.add('active');
                        loadFile(item);
                    }
                };

                itemDiv.appendChild(label);

                if (item.type === 'folder' && item.children) {
                    const childrenDiv = document.createElement('div');
                    childrenDiv.className = `tree-children ${item.open ? 'open' : ''}`;
                    renderTree(item.children, childrenDiv);
                    itemDiv.appendChild(childrenDiv);
                }

                container.appendChild(itemDiv);
            });
        }

        function loadFile(item) {
            const data = contentMap[item.id];
            welcomeScreen.classList.add('hidden');
            codeView.classList.remove('hidden');
            breadcrumb.innerText = item.name;

            if (data) {
                fileNameEl.innerText = data.title;
                fileDescEl.innerText = data.desc;
                codeContentEl.innerHTML = data.code;
            } else {
                fileNameEl.innerText = item.name;
                fileDescEl.innerText = "Binary or config file.";
                codeContentEl.innerHTML = "// No preview";
            }
        }
