<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIOM — AI Brain for Email Intelligence</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@popperjs/core@2"></script>
    <script src="https://unpkg.com/tippy.js@6"></script>
    <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/dist/tippy.css">
    <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/themes/light.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --aqua-primary: #00D4AA;
            --aqua-secondary: #0099CC;
            --aqua-accent: #00FFDD;
            --aqua-dark: #001F3F;
            --aqua-light: #F0FFFE;
            --gradient-aqua: linear-gradient(135deg, #00D4AA 0%, #0099CC 50%, #00FFDD 100%);
            --gradient-dark: linear-gradient(135deg, #001F3F 0%, #003366 50%, #00558B 100%);
            --glow-aqua: 0 0 30px rgba(0, 212, 170, 0.5);
        }

        body {
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            background: #000;
            color: #fff;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Particle Background */
        #particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* Glass Effects */
        .glass {
            background: rgba(0, 31, 63, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 212, 170, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .glass-light {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Gradient Text */
        .gradient-text {
            background: var(--gradient-aqua);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Glow Effects */
        .glow {
            box-shadow: var(--glow-aqua);
        }

        .glow-text {
            text-shadow: 0 0 20px rgba(0, 212, 170, 0.8);
        }

        /* Animated Gradient Background */
        .animated-bg {
            background: linear-gradient(45deg, #001F3F, #003366, #00558B, #003366, #001F3F);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {

            0%,
            100% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }
        }

        /* Parallax Layers */
        .parallax-layer {
            transform: translateZ(0);
            will-change: transform;
        }

        /* Tab System */
        .tab {
            position: relative;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tab::before {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            transform: translateX(-50%) scaleX(0);
            width: 100%;
            height: 3px;
            background: var(--gradient-aqua);
            transition: transform 0.3s ease;
        }

        .tab.active::before {
            transform: translateX(-50%) scaleX(1);
        }

        .tab:hover {
            transform: translateY(-2px);
            color: var(--aqua-accent);
        }

        /* Card Hover Effects */
        .card-interactive {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .card-interactive:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 60px rgba(0, 212, 170, 0.3);
        }

        .card-interactive:hover .card-icon {
            transform: scale(1.2) rotate(5deg);
        }

        .card-icon {
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Pulse Animation */
        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.8;
                transform: scale(1.05);
            }
        }

        .pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        /* Flow Line Animation */
        @keyframes flowLine {
            0% {
                stroke-dashoffset: 1000;
            }

            100% {
                stroke-dashoffset: 0;
            }
        }

        .flow-line {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: flowLine 2s ease-in-out forwards;
        }

        /* Floating Animation */
        @keyframes float {

            0%,
            100% {
                transform: translateY(0px) rotate(0deg);
            }

            50% {
                transform: translateY(-20px) rotate(2deg);
            }
        }

        .floating {
            animation: float 6s ease-in-out infinite;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 12px;
        }

        ::-webkit-scrollbar-track {
            background: #001F3F;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gradient-aqua);
            border-radius: 6px;
        }

        /* Modal */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-backdrop.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            max-width: 900px;
            max-height: 90vh;
            overflow-y: auto;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-backdrop.active .modal-content {
            transform: scale(1);
        }

        /* Button Styles */
        .btn-primary {
            background: var(--gradient-aqua);
            color: white;
            padding: 16px 40px;
            border-radius: 12px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 212, 170, 0.4);
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transition: transform 0.6s ease;
        }

        .btn-primary:hover::before {
            transform: translate(-50%, -50%) scale(2);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 212, 170, 0.6);
        }

        /* Tooltip Customization */
        .tippy-box[data-theme~='aqua'] {
            background: linear-gradient(135deg, #00D4AA 0%, #0099CC 100%);
            border: 1px solid rgba(0, 255, 221, 0.3);
            box-shadow: 0 4px 20px rgba(0, 212, 170, 0.4);
        }

        .tippy-box[data-theme~='aqua'] .tippy-arrow {
            color: #00D4AA;
        }

        /* Loading State */
        .skeleton {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.05) 25%, rgba(255, 255, 255, 0.1) 50%, rgba(255, 255, 255, 0.05) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s ease-in-out infinite;
        }

        @keyframes loading {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        /* Hide scrollbar during parallax */
        .no-scroll {
            overflow: hidden;
        }
    </style>
</head>

<body class="animated-bg">
    <!-- Particle Background -->
    <canvas id="particles"></canvas>

    <!-- Hero Section -->
    <section id="hero" class="min-h-screen flex items-center justify-center relative z-10 px-6 py-20">
        <div class="max-w-6xl w-full text-center">
            <!-- Animated Logo -->
            <div class="floating mb-12">
                <svg class="w-32 h-32 mx-auto" viewBox="0 0 200 200">
                    <defs>
                        <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#00D4AA;stop-opacity:1" />
                            <stop offset="50%" style="stop-color:#0099CC;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#00FFDD;stop-opacity:1" />
                        </linearGradient>
                        <filter id="glow">
                            <feGaussianBlur stdDeviation="4" result="coloredBlur" />
                            <feMerge>
                                <feMergeNode in="coloredBlur" />
                                <feMergeNode in="SourceGraphic" />
                            </feMerge>
                        </filter>
                    </defs>
                    <circle cx="100" cy="100" r="80" stroke="url(#logoGrad)" stroke-width="4" fill="none"
                        filter="url(#glow)" class="pulse" />
                    <circle cx="100" cy="100" r="60" fill="url(#logoGrad)" fill-opacity="0.2" />
                    <path d="M100 40 L120 80 L100 70 L80 80 Z" fill="url(#logoGrad)" filter="url(#glow)" />
                    <path d="M100 160 L120 120 L100 130 L80 120 Z" fill="url(#logoGrad)" filter="url(#glow)" />
                    <circle cx="100" cy="100" r="20" fill="url(#logoGrad)" class="pulse" />
                </svg>
            </div>

            <h1 class="text-7xl md:text-9xl font-black mb-6 glow-text" style="letter-spacing: -0.02em;">
                <span class="gradient-text">AXIOM</span>
            </h1>

            <p class="text-3xl md:text-4xl font-light mb-8 gradient-text">
                The Brain Behind InMarket Traffic
            </p>

            <p class="text-xl md:text-2xl max-w-4xl mx-auto mb-12 text-gray-300">
                A <span class="gradient-text font-semibold">self-healing AI engine</span> that generates trust-building
                content,<br class="hidden md:block">
                learns from every interaction, and gets <span class="gradient-text font-semibold">smarter every
                    day</span>.
            </p>

            <button class="btn-primary text-lg" onclick="scrollToTabs()">
                <span class="relative z-10">Explore the Vision</span> →
            </button>

            <div class="mt-16 text-sm text-gray-400">
                <p>Scroll to discover ↓</p>
            </div>
        </div>
    </section>

    <!-- Sticky Tab Navigation -->
    <nav id="tabNav" class="sticky top-0 z-50 glass">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex items-center gap-8 py-4 overflow-x-auto">
                <div class="tab active text-sm font-bold" data-tab="overview">Overview</div>
                <div class="tab text-sm font-bold" data-tab="imt">InMarket Traffic</div>
                <div class="tab text-sm font-bold" data-tab="architecture">Architecture</div>
                <div class="tab text-sm font-bold" data-tab="constitution">Constitution</div>
                <div class="tab text-sm font-bold" data-tab="workflows">Workflows</div>
                <div class="tab text-sm font-bold" data-tab="visualflow">Visual Flow</div>
                <div class="tab text-sm font-bold" data-tab="learning">Learning Loop</div>
                <div class="tab text-sm font-bold" data-tab="nerdtalk">Nerd Talk</div>
                <div class="tab text-sm font-bold" data-tab="roadmap">Roadmap</div>
            </div>
        </div>
    </nav>

    <!-- Tab Content -->
    <main id="tabContent" class="relative z-10 min-h-screen">
        <!-- Content loaded dynamically -->
    </main>

    <!-- Modal -->
    <div id="modal" class="modal-backdrop">
        <div class="modal-content glass rounded-3xl p-12 m-6">
            <div class="flex justify-between items-start mb-8">
                <h2 id="modalTitle" class="text-4xl font-black gradient-text"></h2>
                <button onclick="closeModal()"
                    class="text-4xl hover:text-aqua-accent transition-colors">&times;</button>
            </div>
            <div id="modalBody" class="text-lg"></div>
        </div>
    </div>

    <script src="AXIOM_VISION_V2_CONTENT.js"></script>
    <script>
        // Initialize GSAP
        gsap.registerPlugin(ScrollTrigger);

        // Particle System
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        const particleCount = 100;

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
                this.opacity = Math.random() * 0.5 + 0.2;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }

            draw() {
                ctx.fillStyle = `rgba(0, 212, 170, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });
            requestAnimationFrame(animateParticles);
        }

        initParticles();
        animateParticles();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Hero Parallax
        window.addEventListener('scroll', () => {
            const scrolled = window.pageYOffset;
            const hero = document.getElementById('hero');
            if (hero) {
                hero.style.transform = `translateY(${scrolled * 0.5}px)`;
                hero.style.opacity = 1 - (scrolled / 600);
            }
        });

        // Tab System
        const tabs = document.querySelectorAll('.tab');
        const tabContent = document.getElementById('tabContent');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                loadTabContent(tab.dataset.tab);
            });
        });

        function scrollToTabs() {
            document.getElementById('tabNav').scrollIntoView({ behavior: 'smooth' });
            setTimeout(() => loadTabContent('overview'), 600);
        }

        function loadTabContent(tabName) {
            const content = getTabContent(tabName);

            // Fade out
            gsap.to(tabContent, {
                opacity: 0,
                y: 20,
                duration: 0.3,
                onComplete: () => {
                    tabContent.innerHTML = content;

                    // Initialize tooltips
                    tippy('[data-tippy-content]', {
                        theme: 'aqua',
                        animation: 'scale',
                        arrow: true
                    });

                    // Fade in
                    gsap.fromTo(tabContent,
                        { opacity: 0, y: 20 },
                        { opacity: 1, y: 0, duration: 0.5 }
                    );

                    // Animate cards
                    gsap.from('.card-interactive', {
                        opacity: 0,
                        y: 50,
                        stagger: 0.1,
                        duration: 0.6,
                        ease: 'back.out(1.7)'
                    });
                }
            });
        }

        // Modal
        function openModal(title, content) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalBody').innerHTML = content;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') closeModal();
        });

        // Initial load
        setTimeout(() => loadTabContent('overview'), 100);
    </script>
</body>

</html>
