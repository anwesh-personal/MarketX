<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIOM — The Brain Behind InMarket Traffic</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@popperjs/core@2"></script>
    <script src="https://unpkg.com/tippy.js@6"></script>
    <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/dist/tippy.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --aqua-primary: #00D4AA;
            --aqua-secondary: #0099CC;
            --aqua-accent: #00FFDD;
            --gradient-aqua: linear-gradient(135deg, #00D4AA 0%, #0099CC 50%, #00FFDD 100%);
        }

        body {
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            transition: all 0.3s ease;
        }

        /* Light Theme */
        body.light-theme {
            --bg-primary: #FFFFFF;
            --bg-secondary: #F8FFFE;
            --bg-glass: rgba(255, 255, 255, 0.7);
            --text-primary: #001F3F;
            --text-secondary: #003366;
            --text-muted: #667788;
            --border-color: rgba(0, 212, 170, 0.2);
            background: linear-gradient(135deg, #F0FFFE 0%, #E5F9F7 100%);
        }

        /* Dark Theme */
        body.dark-theme {
            --bg-primary: #001F3F;
            --bg-secondary: #003366;
            --bg-glass: rgba(0, 31, 63, 0. 8);
            --text-primary: #FFFFFF;
            --text-secondary: #00FFDD;
            --text-muted: #99CCDD;
            --border-color: rgba(0, 212, 170, 0.3);
            background: linear-gradient(135deg, #001F3F 0%, #003366 50%, #00558B 100%);
            animation: gradientShift 15s ease infinite;
            background-size: 400% 400%;
        }

        @keyframes gradientShift {

            0%,
            100% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        #particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.6;
        }

        .glass {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .gradient-text {
            background: var(--gradient-aqua);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .glow {
            box-shadow: 0 0 30px rgba(0, 212, 170, 0.4);
        }

        .tab {
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab::before {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            transform: translateX(-50%) scaleX(0);
            width: 100%;
            height: 3px;
            background: var(--gradient-aqua);
            transition: transform 0.3s ease;
        }

        .tab.active::before {
            transform: translateX(-50%) scaleX(1);
        }

        .tab:hover {
            transform: translateY(-2px);
            color: var(--aqua-accent);
        }

        .card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 60px rgba(0, 212, 170, 0.2);
        }

        .btn-primary {
            background: var(--gradient-aqua);
            color: white;
            padding: 16px 40px;
            border-radius: 12px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 212, 170, 0.4);
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transition: transform 0.6s ease;
        }

        .btn-primary:hover::before {
            transform: translate(-50%, -50%) scale(2);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 212, 170, 0.6);
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        .floating {
            animation: float 6s ease-in-out infinite;
        }

        ::-webkit-scrollbar {
            width: 12px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gradient-aqua);
            border-radius: 6px;
        }

        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-backdrop.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            max-width: 900px;
            max-height: 90vh;
            overflow-y: auto;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-backdrop.active .modal-content {
            transform: scale(1);
        }
    </style>
</head>

<body class="dark-theme">
    <!-- Particle Background -->
    <canvas id="particles"></canvas>

    <!-- Theme Toggle -->
    <button id="themeToggle" class="fixed top-6 right-6 z-50 glass rounded-full p-4 hover:glow transition-all">
        <svg id="sunIcon" class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd"
                d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"
                clip-rule="evenodd"></path>
        </svg>
        <svg id="moonIcon" class="w-6 h-6 hidden" fill="currentColor" viewBox="0 0 20 20">
            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
        </svg>
    </button>

    <!-- Hero Section -->
    <section id="hero" class="min-h-screen flex items-center justify-center relative z-10 px-6 py-20">
        <div class="max-w-6xl w-full text-center">
            <div class="floating mb-12">
                <svg class="w-32 h-32 mx-auto" viewBox="0 0 200 200">
                    <defs>
                        <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#00D4AA" />
                            <stop offset="50%" style="stop-color:#0099CC" />
                            <stop offset="100%" style="stop-color:#00FFDD" />
                        </linearGradient>
                    </defs>
                    <circle cx="100" cy="100" r="80" stroke="url(#logoGrad)" stroke-width="4" fill="none" />
                    <circle cx="100" cy="100" r="60" fill="url(#logoGrad)" fill-opacity="0.2" />
                    <path d="M100 40 L120 80 L100 70 L80 80 Z" fill="url(#logoGrad)" />
                    <path d="M100 160 L120 120 L100 130 L80 120 Z" fill="url(#logoGrad)" />
                    <circle cx="100" cy="100" r="20" fill="url(#logoGrad)" />
                </svg>
            </div>

            <h1 class="text-7xl md:text-9xl font-black mb-6" style="letter-spacing: -0.02em;">
                <span class="gradient-text">AXIOM</span>
            </h1>

            <p class="text-3xl md:text-4xl font-light mb-8 gradient-text">
                The Brain Behind InMarket Traffic
            </p>

            <p class="text-xl md:text-2xl max-w-4xl mx-auto mb-12" style="color: var(--text-secondary);">
                A <span class="gradient-text font-semibold">self-healing AI engine</span> that generates trust-building
                content,<br class="hidden md:block">
                learns from every interaction, and gets <span class="gradient-text font-semibold">smarter every
                    day</span>.
            </p>

            <button class="btn-primary text-lg" onclick="scrollToTabs()">
                <span class="relative z-10">Explore the Vision</span> →
            </button>
        </div>
    </section>

    <!-- Sticky Tab Navigation -->
    <nav id="tabNav" class="sticky top-0 z-50 glass">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex items-center gap-8 py-4 overflow-x-auto">
                <div class="tab active text-sm font-bold" data-tab="overview">Overview</div>
                <div class="tab text-sm font-bold" data-tab="imt">InMarket Traffic</div>
                <div class="tab text-sm font-bold" data-tab="architecture">Architecture</div>
                <div class="tab text-sm font-bold" data-tab="constitution">Constitution</div>
                <div class="tab text-sm font-bold" data-tab="workflows">Workflows</div>
                <div class="tab text-sm font-bold" data-tab="learning">Learning Loop</div>
                <div class="tab text-sm font-bold" data-tab="roadmap">Roadmap</div>
            </div>
        </div>
    </nav>

    <!-- Tab Content -->
    <main id="tabContent" class="relative z-10 min-h-screen max-w-7xl mx-auto px-6 py-20">
        <!-- Content loaded dynamically -->
    </main>

    <!-- Modal -->
    <div id="modal" class="modal-backdrop">
        <div class="modal-content glass rounded-3xl p-12 m-6">
            <div class="flex justify-between items-start mb-8">
                <h2 id="modalTitle" class="text-4xl font-black gradient-text"></h2>
                <button onclick="closeModal()" class="text-4xl hover:opacity-70 transition-opacity">&times;</button>
            </div>
            <div id="modalBody" class="text-lg"></div>
        </div>
    </div>

    <script src="AXIOM_COMPLETE_CONTENT.js"></script>
    <script>
        // Initialize GSAP
        gsap.registerPlugin(ScrollTrigger);

        //Theme Toggle
        const themeToggle = document.getElementById('themeToggle');
        const sunIcon = document.getElementById('sunIcon');
        const moonIcon = document.getElementById('moonIcon');
        let isDark = true;

        themeToggle.addEventListener('click', () => {
            isDark = !isDark;
            document.body.classList.toggle('dark-theme');
            document.body.classList.toggle('light-theme');
            sunIcon.classList.toggle('hidden');
            moonIcon.classList.toggle('hidden');
        });

        // Particle System
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        const particleCount = 100;

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
                this.opacity = Math.random() * 0.5 + 0.2;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }

            draw() {
                ctx.fillStyle = `rgba(0, 212, 170, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });
            requestAnimationFrame(animateParticles);
        }

        initParticles();
        animateParticles();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Hero Parallax
        window.addEventListener('scroll', () => {
            const scrolled = window.pageYOffset;
            const hero = document.getElementById('hero');
            if (hero) {
                hero.style.transform = `translateY(${scrolled * 0.5}px)`;
                hero.style.opacity = 1 - (scrolled / 600);
            }
        });

        // Tab System
        const tabs = document.querySelectorAll('.tab');
        const tabContent = document.getElementById('tabContent');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                loadTabContent(tab.dataset.tab);
            });
        });

        function scrollToTabs() {
            document.getElementById('tabNav').scrollIntoView({ behavior: 'smooth' });
            setTimeout(() => loadTabContent('overview'), 600);
        }

        function loadTabContent(tabName) {
            const content = getTabContent(tabName);

            gsap.to(tabContent, {
                opacity: 0,
                y: 20,
                duration: 0.3,
                onComplete: () => {
                    tabContent.innerHTML = content;

                    // Initialize tooltips if tippy is available
                    if (typeof tippy !== 'undefined') {
                        tippy('[data-tippy-content]', {
                            theme: 'aqua',
                            animation: 'scale',
                            arrow: true
                        });
                    }

                    gsap.fromTo(tabContent,
                        { opacity: 0, y: 20 },
                        { opacity: 1, y: 0, duration: 0.5 }
                    );

                    gsap.from('.card', {
                        opacity: 0,
                        y: 50,
                        stagger: 0.1,
                        duration: 0.6,
                        ease: 'back.out(1.7)'
                    });
                }
            });
        }

        // Modal
        function openModal(title, content) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalBody').innerHTML = content;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') closeModal();
        });

        // Initial load
        setTimeout(() => loadTabContent('overview'), 100);
    </script>
</body>

</html>
