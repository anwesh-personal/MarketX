[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/workers/Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
# Workers expose a management API on port 3100
# This allows health checks and queue management from the frontend

[service]
name = "axiom-workers"
# The workers API listens on port 3100
internalPort = 3100
