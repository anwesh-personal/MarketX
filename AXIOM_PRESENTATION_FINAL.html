<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIOM — The Brain Behind InMarket Traffic</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@popperjs/core@2"></script>
    <script src="https://unpkg.com/tippy.js@6"></script>
    <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/dist/tippy.css">
    <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/themes/light.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --aqua-primary: #00D4AA;
            --aqua-secondary: #0099CC;
            --aqua-accent: #00FFDD;
            --gradient-aqua: linear-gradient(135deg, #00D4AA 0%, #0099CC 50%, #00FFDD 100%);
        }

        body {
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            transition: all 0.3s ease;
        }

        /* LIGHT THEME */
        body.light-theme {
            --bg-primary: #FFFFFF;
            --bg-secondary: #F5FFFE;
            --bg-tertiary: #E8FCFA;
            --bg-glass: rgba(255, 255, 255, 0.85);
            --text-primary: #001F3F;
            --text-secondary: #003366;
            --text-muted: #556677;
            --border-color: rgba(0, 212, 170, 0.25);
            --shadow-color: rgba(0, 153, 204, 0.12);
            background: linear-gradient(135deg, #FFFFFF 0%, #F0FFFE 50%, #E5F9F7 100%);
        }

        /* DARK THEME */
        body.dark-theme {
            --bg-primary: #001F3F;
            --bg-secondary: #002A52;
            --bg-tertiary: #003366;
            --bg-glass: rgba(0, 31, 63, 0.85);
            --text-primary: #FFFFFF;
            --text-secondary: #00FFDD;
            --text-muted: #D0E8F0;
            --border-color: rgba(0, 212, 170, 0.35);
            --shadow-color: rgba(0, 0, 0, 0.4);
            background: linear-gradient(135deg, #001424 0%, #002A52 50%, #003D70 100%);
            background-size: 400% 400%;
            animation: gradientShift 20s ease infinite;
        }

        @keyframes gradientShift {

            0%,
            100% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        #particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.5;
        }

        .glass {
            background: var(--bg-glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 32px var(--shadow-color);
        }

        .gradient-text {
            background: var(--gradient-aqua);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 800;
        }

        .glow {
            box-shadow: 0 0 40px rgba(0, 212, 170, 0.5);
        }

        .tab {
            position: relative;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 12px 20px;
            border-radius: 8px;
        }

        .tab::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%) scaleX(0);
            width: 80%;
            height: 3px;
            background: var(--gradient-aqua);
            border-radius: 3px;
            transition: transform 0.3s ease;
        }

        .tab.active {
            background: rgba(0, 212, 170, 0.1);
        }

        .tab.active::after {
            transform: translateX(-50%) scaleX(1);
        }

        .tab:hover {
            background: rgba(0, 212, 170, 0.05);
            transform: translateY(-2px);
        }

        .card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 24px 60px var(--shadow-color);
        }

        .btn-primary {
            background: var(--gradient-aqua);
            color: white;
            padding: 18px 48px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 18px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 24px rgba(0, 212, 170, 0.4);
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 50%;
            transition: transform 0.6s ease;
        }

        .btn-primary:hover::before {
            transform: translate(-50%, -50%) scale(2.5);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 36px rgba(0, 212, 170, 0.6);
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px) rotate(0deg);
            }

            50% {
                transform: translateY(-25px) rotate(3deg);
            }
        }

        .floating {
            animation: float 8s ease-in-out infinite;
        }

        ::-webkit-scrollbar {
            width: 14px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gradient-aqua);
            border-radius: 10px;
            border: 2px solid var(--bg-secondary);
        }

        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(12px);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-backdrop.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            max-width: 920px;
            max-height: 92vh;
            overflow-y: auto;
            transform: scale(0.92);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-backdrop.active .modal-content {
            transform: scale(1);
        }

        .tippy-box[data-theme~='aqua'] {
            background: linear-gradient(135deg, #00D4AA 0%, #0099CC 100%);
            border: 1px solid rgba(0, 255, 221, 0.4);
            box-shadow: 0 6px 24px rgba(0, 212, 170, 0.5);
            font-size: 14px;
            font-weight: 500;
        }

        .tippy-box[data-theme~='aqua'] .tippy-arrow {
            color: #00D4AA;
        }
    </style>
</head>

<body class="dark-theme">
    <canvas id="particles"></canvas>

    <!-- Theme Toggle -->
    <button id="themeToggle" class="fixed top-8 right-8 z-50 glass rounded-full p-5 hover:glow transition-all"
        data-tippy-content="Toggle dark/light mode">
        <svg id="sunIcon" class="w-7 h-7" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd"
                d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"
                clip-rule="evenodd"></path>
        </svg>
        <svg id="moonIcon" class="w-7 h-7 hidden" fill="currentColor" viewBox="0 0 20 20">
            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
        </svg>
    </button>

    <!-- Hero -->
    <section id="hero" class="min-h-screen flex items-center justify-center relative z-10 px-6 py-24">
        <div class="max-w-7xl w-full text-center">
            <div class="floating mb-16">
                <svg class="w-40 h-40 mx-auto drop-shadow-2xl" viewBox="0 0 200 200">
                    <defs>
                        <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#00D4AA" />
                            <stop offset="50%" style="stop-color:#0099CC" />
                            <stop offset="100%" style="stop-color:#00FFDD" />
                        </linearGradient>
                        <filter id="glow">
                            <feGaussianBlur stdDeviation="5" result="coloredBlur" />
                            <feMerge>
                                <feMergeNode in="coloredBlur" />
                                <feMergeNode in="SourceGraphic" />
                            </feMerge>
                        </filter>
                    </defs>
                    <circle cx="100" cy="100" r="85" stroke="url(#logoGrad)" stroke-width="5" fill="none"
                        filter="url(#glow)" opacity="0.8" />
                    <circle cx="100" cy="100" r="65" fill="url(#logoGrad)" fill-opacity="0.15" />
                    <path d="M100 35 L125 85 L100 75 L75 85 Z" fill="url(#logoGrad)" filter="url(#glow)" />
                    <path d="M100 165 L125 115 L100 125 L75 115 Z" fill="url(#logoGrad)" filter="url(#glow)" />
                    <circle cx="100" cy="100" r="22" fill="url(#logoGrad)" filter="url(#glow)" />
                </svg>
            </div>

            <h1 class="text-8xl md:text-9xl font-black mb-8 tracking-tight">
                <span class="gradient-text">AXIOM</span>
            </h1>

            <p class="text-4xl md:text-5xl font-light mb-10 gradient-text">
                The Brain Behind InMarket Traffic
            </p>

            <p class="text-xl md:text-2xl max-w-5xl mx-auto mb-16 leading-relaxed"
                style="color: var(--text-secondary);">
                A <span class="gradient-text font-bold">self-healing AI engine</span> that generates trust-building
                content,<br class="hidden md:block">
                learns from every interaction, and gets <span class="gradient-text font-bold">smarter every day</span>.
            </p>

            <button class="btn-primary" onclick="scrollToTabs()">
                <span class="relative z-10">Explore the Vision</span>
            </button>
        </div>
    </section>

    <!-- Tabs -->
    <nav id="tabNav" class="sticky top-0 z-50 glass border-b-2" style="border-color: var(--border-color);">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex items-center gap-4 py-3 overflow-x-auto">
                <div class="tab active text-sm font-bold whitespace-nowrap" data-tab="overview">Overview</div>
                <div class="tab text-sm font-bold whitespace-nowrap" data-tab="imt">InMarket Traffic</div>
                <div class="tab text-sm font-bold whitespace-nowrap" data-tab="architecture">Architecture</div>
                <div class="tab text-sm font-bold whitespace-nowrap" data-tab="constitution">Constitution</div>
                <div class="tab text-sm font-bold whitespace-nowrap" data-tab="workflows">Workflows</div>
                <div class="tab text-sm font-bold whitespace-nowrap" data-tab="visualflow">Visual Flow</div>
                <div class="tab text-sm font-bold whitespace-nowrap" data-tab="learning">Learning Loop</div>
                <div class="tab text-sm font-bold whitespace-nowrap" data-tab="nerdtalk">Nerd Talk</div>
                <div class="tab text-sm font-bold whitespace-nowrap" data-tab="roadmap">Roadmap</div>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <main id="tabContent" class="relative z-10 min-h-screen"></main>

    <!-- Modal -->
    <div id="modal" class="modal-backdrop">
        <div class="modal-content glass rounded-3xl p-12 m-8">
            <div class="flex justify-between items-start mb-10">
                <h2 id="modalTitle" class="text-5xl font-black gradient-text"></h2>
                <button onclick="closeModal()" class="text-5xl hover:opacity-70 transition-opacity"
                    style="color: var(--text-primary);">&times;</button>
            </div>
            <div id="modalBody" class="text-lg" style="color: var(--text-primary);"></div>
        </div>
    </div>

    <script src="AXIOM_CONTENT_COMPLETE.js"></script>
    <script>
        gsap.registerPlugin(ScrollTrigger);

        // Theme Toggle
        const themeToggle = document.getElementById('themeToggle');
        const sunIcon = document.getElementById('sunIcon');
        const moonIcon = document.getElementById('moonIcon');
        let isDark = true;

        themeToggle.addEventListener('click', () => {
            isDark = !isDark;
            document.body.classList.toggle('dark-theme');
            document.body.classList.toggle('light-theme');
            sunIcon.classList.toggle('hidden');
            moonIcon.classList.toggle('hidden');
        });

        // Particles
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        const particleCount = 120;

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2.5 + 1;
                this.speedX = Math.random() * 0.6 - 0.3;
                this.speedY = Math.random() * 0.6 - 0.3;
                this.opacity = Math.random() * 0.6 + 0.2;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }

            draw() {
                ctx.fillStyle = `rgba(0, 212, 170, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            for (let i = 0; i < particleCount; i++) particles.push(new Particle());
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateParticles);
        }

        initParticles();
        animateParticles();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Parallax & Fade Hero
        window.addEventListener('scroll', () => {
            const scrolled = window.pageYOffset;
            const hero = document.getElementById('hero');
            if (hero) {
                hero.style.transform = `translateY(${scrolled * 0.5}px)`;
                hero.style.opacity = Math.max(0, 1 - (scrolled / 500));
            }
        });

        // Tabs
        const tabs = document.querySelectorAll('.tab');
        const tabContent = document.getElementById('tabContent');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                loadTabContent(tab.dataset.tab);
            });
        });

        function scrollToTabs() {
            document.getElementById('tabNav').scrollIntoView({ behavior: 'smooth' });
            setTimeout(() => loadTabContent('overview'), 700);
        }

        function loadTabContent(tabName) {
            const content = getTabContent(tabName);

            gsap.to(tabContent, {
                opacity: 0,
                y: 30,
                duration: 0.3,
                onComplete: () => {
                    tabContent.innerHTML = content;

                    if (typeof tippy !== 'undefined') {
                        tippy('[data-tippy-content]', {
                            theme: 'aqua',
                            animation: 'scale',
                            arrow: true,
                            placement: 'top'
                        });
                    }

                    gsap.fromTo(tabContent,
                        { opacity: 0, y: 30 },
                        { opacity: 1, y: 0, duration: 0.6 }
                    );

                    gsap.from('.card', {
                        opacity: 0,
                        y: 60,
                        stagger: 0.12,
                        duration: 0.7,
                        ease: 'back.out(1.5)'
                    });
                }
            });
        }

        function openModal(title, content) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalBody').innerHTML = content;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') closeModal();
        });

        // Initialize tooltips on theme toggle
        if (typeof tippy !== 'undefined') {
            tippy('#themeToggle', {
                theme: 'aqua',
                animation: 'scale',
                arrow: true
            });
        }

        setTimeout(() => loadTabContent('overview'), 150);
    </script>
</body>

</html>
