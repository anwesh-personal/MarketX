<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIOM — The Intelligence Layer</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@popperjs/core@2"></script>
    <script src="https://unpkg.com/tippy.js@6"></script>
    <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/dist/tippy.css">
    <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/themes/light.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --aqua-primary: #00D4AA;
            --aqua-secondary: #0099CC;
            --aqua-accent: #00FFDD;
            --gradient-aqua: linear-gradient(135deg, #00D4AA 0%, #0099CC 50%, #00FFDD 100%);
            --noise-bg: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
        }

        body {
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* LIGHT THEME - MAX CONTRAST - FULL OVERRIDE */
        body.light-theme {
            --bg-primary: #FFFFFF;
            --bg-secondary: #F1F5F9;
            --bg-tertiary: #E2E8F0;
            --bg-glass: rgba(255, 255, 255, 0.98);
            --bg-card: #FFFFFF;
            --text-primary: #0F172A;
            --text-secondary: #1E293B;
            --text-muted: #475569;
            --border-color: #CBD5E1;
            --shadow-color: rgba(0, 0, 0, 0.1);
            --card-hover-shadow: rgba(0, 0, 0, 0.15);
            --gradient-dark: linear-gradient(135deg, #E2E8F0 0%, #F1F5F9 100%);
            background: #F8FAFC;
            color: #0F172A;
        }

        /* Light Theme Specific Overrides */
        body.light-theme .glass {
            background: rgba(255, 255, 255, 0.95) !important;
            border-color: #CBD5E1 !important;
        }

        body.light-theme h1,
        body.light-theme h2,
        body.light-theme h3,
        body.light-theme h4,
        body.light-theme h5,
        body.light-theme h6 {
            color: #0F172A !important;
        }

        body.light-theme p,
        body.light-theme li,
        body.light-theme span:not(.gradient-text),
        body.light-theme div:not(.gradient-text) {
            color: #1E293B;
        }

        body.light-theme .text-muted,
        body.light-theme [class*="text-muted"] {
            color: #64748B !important;
        }

        body.light-theme .mono {
            color: #0F172A !important;
        }

        body.light-theme code,
        body.light-theme pre {
            color: #0891B2 !important;
            background: #F1F5F9 !important;
        }

        /* Force override inline rgba backgrounds that are too dark */
        body.light-theme [style*="rgba(15, 23, 42"],
        body.light-theme [style*="rgba(0, 212, 170, 0.1)"],
        body.light-theme [style*="rgba(0, 153, 204, 0.1)"],
        body.light-theme [style*="rgba(16, 185, 129, 0.1)"],
        body.light-theme [style*="rgba(245, 158, 11, 0.1)"] {
            background: #F1F5F9 !important;
            border-color: #CBD5E1 !important;
        }

        body.light-theme [style*="background: var(--bg-tertiary)"] {
            background: #E2E8F0 !important;
        }

        body.light-theme [style*="background: var(--bg-secondary)"] {
            background: #F1F5F9 !important;
        }

        /* Light theme text inside gradient boxes should stay white */
        body.light-theme [style*="background: var(--gradient-aqua)"] p,
        body.light-theme [style*="background: var(--gradient-aqua)"] span,
        body.light-theme [style*="background: linear-gradient(135deg, #00D4AA"] p,
        body.light-theme [style*="background: linear-gradient(135deg, #00D4AA"] span,
        body.light-theme [style*="background: linear-gradient(135deg, #10B981"] p,
        body.light-theme [style*="background: linear-gradient(135deg, #10B981"] span {
            color: white !important;
        }

        /* Fix connector arrows visibility in light mode */
        body.light-theme [style*="color: #00D4AA"],
        body.light-theme [style*="color: #0099CC"],
        body.light-theme [style*="color: #10B981"],
        body.light-theme [style*="color: #F59E0B"] {
            font-weight: 700;
        }

        /* Ensure inline var(--text-primary) works in light theme */
        body.light-theme [style*="color: var(--text-primary)"] {
            color: #0F172A !important;
        }

        body.light-theme [style*="color: var(--text-muted)"] {
            color: #64748B !important;
        }

        body.light-theme [style*="color: var(--text-secondary)"] {
            color: #334155 !important;
        }

        /* Override hardcoded white text that should be dark in light mode */
        body.light-theme [style*="color: #FFFFFF"]:not([style*="background"]),
        body.light-theme [style*="color: white"]:not([style*="background"]) {
            color: #0F172A !important;
        }

        /* But keep text white inside gradient backgrounds */
        body.light-theme [style*="gradient"] [style*="color: white"],
        body.light-theme [style*="gradient"] [style*="color: #FFFFFF"] {
            color: white !important;
        }

        /* Light theme font-bold should be darker for contrast */
        body.light-theme .font-bold,
        body.light-theme .font-semibold,
        body.light-theme .font-black {
            color: #0F172A;
        }

        /* Hero section text in light mode */
        body.light-theme #hero-title {
            color: #0F172A !important;
        }

        body.light-theme #hero-subtitle {
            color: #334155 !important;
        }

        /* Modal in light theme */
        body.light-theme .modal-content {
            background: #FFFFFF !important;
            color: #0F172A !important;
            border: 2px solid #CBD5E1 !important;
        }

        body.light-theme .modal-content p,
        body.light-theme .modal-content li,
        body.light-theme .modal-content span {
            color: #1E293B !important;
        }

        body.light-theme .modal-content h4 {
            color: #0F172A !important;
        }

        /* Light theme tab content text */
        body.light-theme #tab-content p,
        body.light-theme #tab-content li,
        body.light-theme #tab-content span:not(.gradient-text) {
            color: #1E293B;
        }

        body.light-theme #tab-content h3,
        body.light-theme #tab-content h4 {
            color: #0F172A !important;
        }

        /* DARK THEME - DEEP SPACE AESTHETIC */
        body.dark-theme {
            --bg-primary: #020617;
            --bg-secondary: #0F172A;
            --bg-tertiary: #1E293B;
            --bg-glass: rgba(2, 6, 23, 0.95);
            --bg-card: rgba(15, 23, 42, 0.85);
            --text-primary: #FFFFFF;
            --text-secondary: #E2E8F0;
            --text-muted: #CBD5E1;
            --border-color: rgba(255, 255, 255, 0.15);
            --shadow-color: rgba(0, 0, 0, 0.7);
            --card-hover-shadow: rgba(0, 212, 170, 0.3);
            --gradient-dark: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            background: #020617;
            color: #FFFFFF;
        }

        /* Noise Overlay - Subtle */
        .noise-overlay {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background-image: var(--noise-bg);
            opacity: 0.2;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        #particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .glass {
            background: var(--bg-glass);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px var(--shadow-color);
            transition: all 0.3s ease;
        }

        .gradient-text {
            background: var(--gradient-aqua);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 800;
        }

        /* Cards - Solid backgrounds for better readability */
        .card,
        .glass-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 1.5rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: var(--text-primary);
        }

        .card:hover,
        .glass-card:hover {
            transform: translateY(-6px);
            border-color: var(--aqua-primary);
            box-shadow: 0 15px 30px var(--card-hover-shadow);
        }

        /* Tabs */
        .tab {
            position: relative;
            cursor: pointer;
            padding: 10px 24px;
            border-radius: 9999px;
            font-weight: 600;
            color: var(--text-muted);
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .tab:hover {
            color: var(--text-primary);
            background: var(--bg-tertiary);
        }

        .tab.active {
            color: #FFFFFF !important;
            background: var(--gradient-aqua);
            box-shadow: 0 4px 15px rgba(0, 212, 170, 0.3);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        /* Buttons */
        .btn-primary {
            background: var(--gradient-aqua);
            color: #FFFFFF !important;
            padding: 16px 40px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 18px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px rgba(0, 212, 170, 0.4);
            position: relative;
            overflow: hidden;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 212, 170, 0.5);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 5px;
            border: 2px solid var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--aqua-primary);
        }

        /* Modal - High Contrast */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            z-index: 1001;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-backdrop.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            width: 90%;
            max-width: 900px;
            max-height: 85vh;
            overflow-y: auto;
            transform: scale(0.95);
            transition: all 0.3s ease-out;
            background: var(--bg-primary);
            /* Uses theme background */
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }

        .modal-backdrop.active .modal-content {
            transform: scale(1);
        }

        /* UTILITY OVERRIDES FOR DYNAMIC CONTENT */
        /* These force strict adherence to the theme variables */
        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            color: var(--text-primary) !important;
        }

        p,
        li,
        span,
        div {
            color: var(--text-secondary);
        }

        code,
        pre {
            color: var(--aqua-accent) !important;
        }

        .text-muted {
            color: var(--text-muted) !important;
        }

        .text-primary {
            color: var(--text-primary) !important;
        }

        /* Ensure background colors from content JS don't break the theme */
        [style*="background: #1a1a1a"] {
            background: var(--bg-tertiary) !important;
        }

        [style*="background: var(--bg-secondary)"] {
            background: var(--bg-secondary) !important;
        }

        [style*="color: white"],
        [style*="color: #FFFFFF"] {
            color: var(--text-primary) !important;
        }

        /* PERF OPTIMIZED ANIMATION */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade {
            animation: fadeInUp 0.3s ease-out forwards;
            will-change: opacity, transform;
        }

        /* Hover Glow for Interactive Cards */
        .hover\:glow:hover {
            box-shadow: 0 0 30px rgba(0, 212, 170, 0.4), 0 0 60px rgba(0, 212, 170, 0.2);
            border-color: #00D4AA !important;
        }

        /* Pulse Animation for Connectors */
        @keyframes connectorPulse {

            0%,
            100% {
                opacity: 0.4;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }
    </style>
</head>

<body class="dark-theme selection:bg-[#00D4AA] selection:text-white">
    <div class="noise-overlay"></div>
    <canvas id="particles"></canvas>

    <!-- Theme Toggle -->
    <button id="themeToggle"
        class="fixed top-8 right-8 z-[100] glass rounded-full p-4 hover:scale-110 transition-transform cursor-pointer"
        data-tippy-content="Toggle dark/light mode">
        <svg id="sunIcon" class="w-6 h-6 text-yellow-400 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z">
            </path>
        </svg>
        <svg id="moonIcon" class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
        </svg>
    </button>

    <!-- Hero Section -->
    <section id="hero" class="min-h-screen flex items-center justify-center relative z-10 px-6 py-24">
        <div class="max-w-7xl w-full text-center">
            <div class="mb-12 inline-block relative group">
                <div
                    class="absolute inset-0 bg-gradient-to-r from-[#00D4AA] to-[#0099CC] rounded-full blur-[60px] opacity-20 group-hover:opacity-40 transition-opacity duration-700">
                </div>
                <svg class="w-48 h-48 relative z-10 drop-shadow-2xl animate-[float_6s_ease-in-out_infinite]"
                    viewBox="0 0 200 200">
                    <defs>
                        <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#00D4AA" />
                            <stop offset="100%" style="stop-color:#0099CC" />
                        </linearGradient>
                    </defs>
                    <path d="M100 20 L180 65 L180 155 L100 200 L20 155 L20 65 Z" fill="none" stroke="url(#logoGrad)"
                        stroke-width="2" />
                    <path d="M100 50 L150 80 L150 140 L100 170 L50 140 L50 80 Z" fill="url(#logoGrad)"
                        fill-opacity="0.1" stroke="url(#logoGrad)" stroke-width="1" />
                    <circle cx="100" cy="110" r="15" fill="url(#logoGrad)" class="animate-pulse" />
                </svg>
            </div>

            <h1 class="text-7xl md:text-9xl font-black mb-6 tracking-tight leading-none">
                <span class="gradient-text">AXIOM</span>
            </h1>

            <p class="text-2xl md:text-4xl font-light mb-12" style="color: var(--text-secondary);">
                The Intelligence Layer <span class="opacity-50 mx-2">|</span> <span
                    class="text-white font-medium">InMarket Traffic</span>
            </p>

            <div class="flex flex-col md:flex-row gap-6 justify-center items-center">
                <button class="btn-primary flex items-center gap-3 group" onclick="scrollToTabs()">
                    Explore Architecture
                    <span class="group-hover:translate-y-1 transition-transform">↓</span>
                </button>
            </div>
        </div>
    </section>

    <!-- Navigation -->
    <nav id="tabNav" class="sticky top-6 z-50 transition-all duration-300 transform translate-y-0">
        <div class="max-w-fit mx-auto glass rounded-full p-2 border border-white/10 shadow-2xl">
            <div class="flex items-center gap-1 overflow-x-auto no-scrollbar px-2">
                <div class="tab active" data-tab="overview">Overview</div>
                <div class="tab" data-tab="imt">IMT</div>
                <div class="tab" data-tab="architecture">Architecture</div>
                <div class="tab" data-tab="constitution">Constitution</div>
                <div class="tab" data-tab="workflows">Workflows</div>
                <div class="tab" data-tab="visualflow">Visual Flow</div>
                <div class="tab" data-tab="learning">Learning</div>
                <div class="tab" data-tab="nerdtalk">Nerd Talk</div>
                <div class="tab" data-tab="roadmap">Roadmap</div>
            </div>
        </div>
    </nav>

    <!-- Content Area -->
    <main id="tabContent" class="relative z-10 min-h-screen pt-12 pb-24"></main>

    <!-- Modal -->
    <div id="modal" class="modal-backdrop">
        <div class="modal-content glass rounded-3xl p-10 relative">
            <button onclick="closeModal()"
                class="absolute top-6 right-6 p-2 rounded-full hover:bg-white/10 transition-colors z-[1002]">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                    </path>
                </svg>
            </button>
            <h2 id="modalTitle" class="text-4xl font-bold gradient-text mb-8 pr-12"></h2>
            <div id="modalBody" class="text-lg leading-relaxed"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="AXIOM_CONTENT_COMPLETE.js"></script>
    <script>
        // Init GSAP & ScrollTrigger
        gsap.registerPlugin(ScrollTrigger);

        // Theme Logic
        const toggleBtn = document.getElementById('themeToggle');
        const sun = document.getElementById('sunIcon');
        const moon = document.getElementById('moonIcon');
        let isDark = true;

        toggleBtn.addEventListener('click', () => {
            isDark = !isDark;
            document.body.classList.toggle('dark-theme');
            document.body.classList.toggle('light-theme');
            sun.classList.toggle('hidden');
            moon.classList.toggle('hidden');
        });

        // Particle System
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.size = Math.random() * 2;
                this.alpha = Math.random() * 0.5;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > width) this.x = width - this.x; // Wrap
                if (this.y < 0 || this.y > height) this.y = height - this.y;
            }
            draw() {
                ctx.fillStyle = `rgba(0, 212, 170, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            resize();
            for (let i = 0; i < 40; i++) particles.push(new Particle()); // Reduced from 100 for perf
            animate();
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        initParticles();

        // Parallax Hero
        window.addEventListener('scroll', () => {
            const y = window.scrollY;
            document.getElementById('hero').style.transform = `translateY(${y * 0.3}px)`;
            document.getElementById('hero').style.opacity = 1 - (y / 700);
        });

        // Tab Logic
        const tabs = document.querySelectorAll('.tab');
        const contentContainer = document.getElementById('tabContent');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const target = tab.dataset.tab;

                // 1. Instant Visual Feedback (Updates Button State Immediately)
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');

                // 2. Defer Heavy Paint to next frame so visual click registers first
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        // Swap Content
                        contentContainer.classList.remove('animate-fade');
                        contentContainer.innerHTML = getTabContent(target);

                        // Force Reflow for Animation Restart
                        void contentContainer.offsetWidth;
                        contentContainer.classList.add('animate-fade');

                        // Optimized Tooltip Init (Scoped to content only)
                        const tips = contentContainer.querySelectorAll('[data-tippy-content]');
                        if (tips.length > 0) {
                            tippy(tips, { theme: 'aqua', animation: 'scale' });
                        }

                        // SCROLL POSITION RESET - Always scroll to top of content on tab switch
                        const nav = document.getElementById('tabNav');
                        const navTop = nav.getBoundingClientRect().top + window.scrollY;
                        window.scrollTo({
                            top: navTop - 10,
                            behavior: 'instant'
                        });
                    });
                });
            });
        });

        function scrollToTabs() {
            const nav = document.getElementById('tabNav');
            nav.scrollIntoView({ behavior: 'smooth', block: 'start' });
            // Auto click Overview if not active?
        }

        // Modal Logic
        window.openModal = function (title, content) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalBody').innerHTML = content;
            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden'; // Lock scroll
        }

        window.closeModal = function () {
            document.getElementById('modal').classList.remove('active');
            document.body.style.overflow = ''; // Unlock
        }

        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') closeModal();
        });

        // Initialize First Tab
        setTimeout(() => {
            document.querySelector('.tab[data-tab="overview"]').click();
        }, 100);

    </script>
